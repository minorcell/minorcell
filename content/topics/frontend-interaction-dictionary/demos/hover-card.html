<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hover Card</title>
    <style>
      :root {
        --bg: #faf8f3;
        --fg: #1a1815;
        --muted: #6b6760;
        --border: #e6e1d4;
        --card: #ffffff;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        background: var(--bg);
        color: var(--fg);
        font:
          14px/1.55 -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC',
          'Hiragino Sans GB', sans-serif;
        display: grid;
        place-items: center;
        padding: 32px;
      }
      .stage { width: 100%; max-width: 320px; }
      .stage-label {
        font:
          500 10.5px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
        letter-spacing: 0.22em;
        color: var(--muted);
        text-transform: uppercase;
        margin-bottom: 14px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 18px 18px 16px;
        cursor: pointer;
        transition:
          transform 200ms cubic-bezier(0.2, 0, 0, 1),
          box-shadow 200ms cubic-bezier(0.2, 0, 0, 1),
          border-color 200ms ease;
        box-shadow: 0 1px 0 rgba(20, 18, 14, 0.02);
      }
      .card:hover {
        transform: translateY(-4px);
        box-shadow:
          0 12px 24px -8px rgba(20, 18, 14, 0.12),
          0 2px 6px -2px rgba(20, 18, 14, 0.06);
        border-color: color-mix(in oklab, var(--border) 60%, var(--fg));
      }
      .row { display: flex; align-items: center; gap: 10px; }
      .dot {
        width: 8px; height: 8px; border-radius: 999px;
        background: #5b8def; flex: 0 0 auto;
      }
      .title { font-weight: 500; font-size: 14.5px; }
      .desc {
        margin: 8px 0 14px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.55;
      }
      .meta {
        display: flex; align-items: center; justify-content: space-between;
        font:
          500 11px/1 ui-monospace, SFMono-Regular, monospace;
        color: var(--muted);
        letter-spacing: 0.04em;
      }
      .arrow {
        opacity: 0;
        transform: translateX(-4px);
        transition: opacity 200ms ease, transform 200ms ease;
      }
      .card:hover .arrow { opacity: 1; transform: translateX(0); }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="stage-label">Hover the card</div>
      <article class="card" tabindex="0">
        <div class="row">
          <span class="dot" aria-hidden="true"></span>
          <h3 class="title">Atlas Migration</h3>
        </div>
        <p class="desc">迁移用户数据到新的存储集群，预计 4 月底完成。</p>
        <div class="meta">
          <span>UPDATED · 2D AGO</span>
          <span class="arrow" aria-hidden="true">→</span>
        </div>
      </article>
    </div>
  </body>
</html>
