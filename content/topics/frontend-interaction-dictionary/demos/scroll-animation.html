<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Scroll Animation</title>
    <style>
      :root { --bg:#faf8f3; --fg:#1a1815; --muted:#6b6760; --border:#d8d3c5; --card:#fff; }
      * { box-sizing:border-box; }
      html, body { height:100%; margin:0; }
      body { background:var(--bg); color:var(--fg); font:14px/1.55 -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB',sans-serif; }
      .scroll { height:100vh; overflow:auto; padding:24px; scroll-behavior:smooth; }
      .spacer { height:120px; display:grid; place-items:center; color:var(--muted); font-size:12px; }
      .grid { display:grid; gap:12px; max-width:360px; margin:0 auto 80px; }
      .card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:15px; opacity:0; transform:translateY(12px); transition:opacity 360ms ease, transform 360ms cubic-bezier(0.2,0,0,1); }
      .card[data-visible='true'] { opacity:1; transform:translateY(0); }
      .card:nth-child(2) { transition-delay:80ms; }
      .card:nth-child(3) { transition-delay:160ms; }
      h3 { margin:0 0 5px; font-size:14px; }
      p { margin:0; color:var(--muted); font-size:12.5px; line-height:1.6; }
    </style>
  </head>
  <body>
    <div class="scroll" id="scroll">
      <div class="spacer">向下滚动，卡片进入视口后淡入</div>
      <section class="grid">
        <article class="card"><h3>轻量进入</h3><p>只用透明度和 12px 位移，避免影响阅读。</p></article>
        <article class="card"><h3>顺序延迟</h3><p>相邻卡片延迟 80ms，形成可感知的节奏。</p></article>
        <article class="card"><h3>展示型页面</h3><p>适合官网、作品集；后台系统要谨慎使用。</p></article>
      </section>
    </div>
    <script>
      (function () {
        var root = document.getElementById('scroll');
        var cards = Array.prototype.slice.call(document.querySelectorAll('.card'));
        function check() {
          cards.forEach(function (card) {
            var rect = card.getBoundingClientRect();
            if (rect.top < window.innerHeight - 40) card.setAttribute('data-visible', 'true');
          });
        }
        root.addEventListener('scroll', check);
        check();
      })();
    </script>
  </body>
</html>
