<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tooltip</title>
    <style>
      :root { --bg:#faf8f3; --fg:#1a1815; --muted:#6b6760; --border:#d8d3c5; --card:#fff; --accent:#b9483d; }
      * { box-sizing:border-box; }
      html, body { height:100%; margin:0; }
      body { background:var(--bg); color:var(--fg); font:14px/1.55 -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB',sans-serif; display:grid; place-items:center; padding:32px; }
      .field { width:300px; background:var(--card); border:1px solid var(--border); border-radius:12px; padding:18px; }
      .label { display:flex; align-items:center; gap:7px; font-weight:500; margin-bottom:9px; }
      .info { position:relative; width:18px; height:18px; border-radius:999px; border:1px solid var(--border); display:grid; place-items:center; color:var(--muted); cursor:help; font:600 12px/1 ui-monospace,SFMono-Regular,Menlo,monospace; }
      .tip { position:absolute; left:50%; bottom:calc(100% + 9px); transform:translate(-50%, 4px); width:max-content; max-width:220px; background:var(--fg); color:var(--bg); border-radius:8px; padding:7px 9px; font:500 12px/1.4 -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif; opacity:0; pointer-events:none; transition:opacity 150ms ease, transform 150ms ease; }
      .info:hover .tip, .info:focus-visible .tip { opacity:1; transform:translate(-50%,0); }
      .input { height:40px; border:1px solid var(--border); border-radius:8px; padding:0 11px; color:var(--muted); display:flex; align-items:center; }
    </style>
  </head>
  <body>
    <div class="field">
      <div class="label">
        API Key
        <span class="info" tabindex="0">i<span class="tip">只展示一次，请复制后妥善保存。</span></span>
      </div>
      <div class="input">sk_live_••••••••••••</div>
    </div>
  </body>
</html>
