<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Transition</title>
    <style>
      :root { --bg:#faf8f3; --fg:#1a1815; --muted:#6b6760; --border:#d8d3c5; --card:#fff; --ok:#2f8f5a; }
      * { box-sizing:border-box; }
      html, body { height:100%; margin:0; }
      body { background:var(--bg); color:var(--fg); font:14px/1.55 -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB',sans-serif; display:grid; place-items:center; padding:32px; }
      .stage { display:grid; gap:16px; place-items:center; }
      .card { width:260px; background:var(--card); border:1px solid var(--border); border-radius:12px; padding:18px; transition:background-color 200ms ease, border-color 200ms ease, transform 200ms cubic-bezier(0.2,0,0,1), box-shadow 200ms ease; }
      .card[data-active='true'] { background:#f0f7f2; border-color:#b8d8c3; transform:translateY(-3px); box-shadow:0 12px 24px -18px rgba(47,143,90,0.45); }
      h3 { margin:0 0 6px; font-size:15px; }
      p { margin:0; color:var(--muted); font-size:13px; line-height:1.6; }
      button { appearance:none; cursor:pointer; font:inherit; font-weight:500; padding:8px 14px; border-radius:8px; border:1px solid var(--fg); background:var(--fg); color:var(--bg); }
    </style>
  </head>
  <body>
    <div class="stage">
      <article class="card" id="card"><h3>状态变化</h3><p>Transition 让颜色、位置、阴影的变化不突兀。</p></article>
      <button id="toggle" type="button">切换状态</button>
    </div>
    <script>
      (function () {
        var card = document.getElementById('card');
        document.getElementById('toggle').addEventListener('click', function () {
          card.setAttribute('data-active', card.getAttribute('data-active') !== 'true' ? 'true' : 'false');
        });
      })();
    </script>
  </body>
</html>
