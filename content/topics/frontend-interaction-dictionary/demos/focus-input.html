<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Focus State</title>
    <style>
      :root {
        --bg: #faf8f3;
        --fg: #1a1815;
        --muted: #6b6760;
        --border: #d8d3c5;
        --card: #ffffff;
        --ring: #5b8def;
        --error: #c34a3b;
        --accent: #b9483d;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        background: var(--bg);
        color: var(--fg);
        font:
          14px/1.55 -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC',
          'Hiragino Sans GB', sans-serif;
        display: grid;
        place-items: center;
        padding: 32px;
      }
      .stage { width: 100%; max-width: 320px; display: grid; gap: 18px; }
      .stage-label {
        font:
          500 10.5px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
        letter-spacing: 0.22em;
        color: var(--muted);
        text-transform: uppercase;
      }
      .field { display: grid; gap: 6px; }
      label {
        font-size: 12px;
        color: var(--muted);
        font-weight: 500;
        letter-spacing: 0.02em;
      }
      input {
        appearance: none;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 12px;
        font: inherit;
        color: var(--fg);
        outline: none;
        transition:
          border-color 160ms ease,
          box-shadow 160ms ease;
      }
      input::placeholder { color: color-mix(in oklab, var(--muted) 70%, transparent); }
      input:hover { border-color: color-mix(in oklab, var(--border) 50%, var(--fg)); }
      input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 22%, transparent);
      }
      .field.error input {
        border-color: var(--error);
      }
      .field.error input:focus {
        box-shadow: 0 0 0 3px color-mix(in oklab, var(--error) 18%, transparent);
      }
      .hint {
        font-size: 12px;
        color: var(--muted);
        min-height: 1em;
      }
      .field.error .hint { color: var(--error); }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="stage-label">Click to focus</div>
      <div class="field">
        <label for="email">EMAIL</label>
        <input id="email" type="email" placeholder="you@example.com" autocomplete="off" />
        <div class="hint">输入框 focus 时边框变蓝并出现 focus ring。</div>
      </div>
      <div class="field error">
        <label for="email-bad">EMAIL（校验失败示例）</label>
        <input id="email-bad" type="email" value="not-an-email" autocomplete="off" />
        <div class="hint">请输入有效的邮箱地址。</div>
      </div>
    </div>
  </body>
</html>
