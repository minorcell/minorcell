<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Drawer</title>
    <style>
      :root { --bg:#faf8f3; --fg:#1a1815; --muted:#6b6760; --border:#d8d3c5; --card:#fff; }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body { background:var(--bg); color:var(--fg); font:14px/1.55 -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB',sans-serif; display:grid; place-items:center; padding:28px; overflow:hidden; }
      .list { width:min(360px,100%); background:var(--card); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
      .row { width:100%; appearance:none; border:0; border-bottom:1px solid var(--border); background:transparent; padding:14px 16px; display:flex; justify-content:space-between; align-items:center; text-align:left; cursor:pointer; font:inherit; color:var(--fg); transition:background-color 160ms ease; }
      .row:last-child { border-bottom:0; }
      .row:hover { background:#f4f0e8; }
      .meta { color:var(--muted); font-size:12px; }
      .overlay { position:fixed; inset:0; background:rgba(26,24,21,0.22); opacity:0; pointer-events:none; transition:opacity 180ms ease; }
      .overlay[data-open='true'] { opacity:1; pointer-events:auto; }
      .drawer { position:fixed; top:0; right:0; height:100%; width:min(360px,88vw); background:var(--card); border-left:1px solid var(--border); padding:22px; transform:translateX(100%); transition:transform 220ms cubic-bezier(0.2,0,0,1); box-shadow:-20px 0 40px -30px rgba(20,18,14,0.45); }
      .overlay[data-open='true'] .drawer { transform:translateX(0); }
      .top { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
      h3 { margin:0; font-size:16px; }
      .close { appearance:none; border:1px solid var(--border); background:var(--bg); border-radius:8px; width:32px; height:32px; cursor:pointer; }
      p { margin:0 0 14px; color:var(--muted); font-size:13px; line-height:1.65; }
      .chip { display:inline-flex; border:1px solid var(--border); border-radius:999px; padding:4px 9px; font-size:12px; color:var(--muted); }
    </style>
  </head>
  <body>
    <div class="list">
      <button class="row" type="button"><span>Atlas Migration</span><span class="meta">查看详情</span></button>
      <button class="row" type="button"><span>Search Rewrite</span><span class="meta">查看详情</span></button>
      <button class="row" type="button"><span>Billing Audit</span><span class="meta">查看详情</span></button>
    </div>
    <div class="overlay" id="overlay">
      <aside class="drawer" aria-label="项目详情">
        <div class="top"><h3>Atlas Migration</h3><button class="close" id="close" type="button">×</button></div>
        <p>Drawer 保留了列表上下文，适合详情预览、筛选面板和轻量编辑。</p>
        <span class="chip">In progress</span>
      </aside>
    </div>
    <script>
      (function () {
        var overlay = document.getElementById('overlay');
        var close = document.getElementById('close');
        function setOpen(value) { overlay.setAttribute('data-open', value ? 'true' : 'false'); }
        Array.prototype.forEach.call(document.querySelectorAll('.row'), function (row) { row.addEventListener('click', function () { setOpen(true); }); });
        close.addEventListener('click', function () { setOpen(false); });
        overlay.addEventListener('click', function (event) { if (event.target === overlay) setOpen(false); });
      })();
    </script>
  </body>
</html>
