<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tabs</title>
    <style>
      :root { --bg:#faf8f3; --fg:#1a1815; --muted:#6b6760; --border:#d8d3c5; --card:#fff; }
      * { box-sizing:border-box; }
      html, body { height:100%; margin:0; }
      body { background:var(--bg); color:var(--fg); font:14px/1.55 -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB',sans-serif; display:grid; place-items:center; padding:32px; }
      .panel { width:min(360px,100%); background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px; }
      .tabs { display:grid; grid-template-columns:repeat(3,1fr); gap:4px; background:#f0ebe1; border-radius:9px; padding:4px; margin-bottom:14px; }
      .tab { appearance:none; border:0; border-radius:7px; background:transparent; padding:7px 8px; cursor:pointer; font:inherit; font-size:13px; color:var(--muted); transition:background-color 150ms ease, color 150ms ease; }
      .tab[aria-selected='true'] { background:var(--card); color:var(--fg); box-shadow:0 1px 0 rgba(20,18,14,0.04); }
      .content { min-height:92px; border:1px solid var(--border); border-radius:10px; padding:14px; opacity:1; transition:opacity 150ms ease; }
      h3 { margin:0 0 7px; font-size:15px; }
      p { margin:0; color:var(--muted); font-size:13px; line-height:1.6; }
    </style>
  </head>
  <body>
    <section class="panel">
      <div class="tabs" role="tablist">
        <button class="tab" aria-selected="true" data-tab="overview" type="button">概览</button>
        <button class="tab" aria-selected="false" data-tab="members" type="button">成员</button>
        <button class="tab" aria-selected="false" data-tab="settings" type="button">设置</button>
      </div>
      <div class="content" id="content"><h3>项目概览</h3><p>Tabs 用来切换同一层级下的平级内容。</p></div>
    </section>
    <script>
      (function () {
        var copy = {
          overview: ['项目概览', 'Tabs 用来切换同一层级下的平级内容。'],
          members: ['成员管理', '切换时只替换内容区域，顶部结构保持稳定。'],
          settings: ['项目设置', '当前 tab 需要明确高亮，避免用户迷路。']
        };
        var content = document.getElementById('content');
        Array.prototype.forEach.call(document.querySelectorAll('.tab'), function (tab) {
          tab.addEventListener('click', function () {
            Array.prototype.forEach.call(document.querySelectorAll('.tab'), function (item) { item.setAttribute('aria-selected', 'false'); });
            tab.setAttribute('aria-selected', 'true');
            content.style.opacity = '0';
            setTimeout(function () {
              var value = copy[tab.dataset.tab];
              content.innerHTML = '<h3>' + value[0] + '</h3><p>' + value[1] + '</p>';
              content.style.opacity = '1';
            }, 120);
          });
        });
      })();
    </script>
  </body>
</html>
