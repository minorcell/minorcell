<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Micro Interaction</title>
    <style>
      :root { --bg:#faf8f3; --fg:#1a1815; --muted:#6b6760; --border:#d8d3c5; --card:#fff; --accent:#b9483d; }
      * { box-sizing:border-box; }
      html, body { height:100%; margin:0; }
      body { background:var(--bg); color:var(--fg); font:14px/1.55 -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB',sans-serif; display:grid; place-items:center; padding:32px; }
      .stage { display:flex; align-items:center; gap:16px; flex-direction:column; }
      .switch-row { display:flex; align-items:center; gap:14px; cursor:pointer; user-select:none; }
      .track { width:44px; height:24px; border-radius:12px; background:#d8d3c5; position:relative; transition:background 220ms cubic-bezier(0.2,0,0,1); flex-shrink:0; }
      .track.on { background:var(--accent); }
      .knob { width:18px; height:18px; border-radius:50%; background:#fff; position:absolute; top:3px; left:3px; transition:transform 220ms cubic-bezier(0.2,0,0,1); box-shadow:0 1px 3px rgba(20,18,14,0.15); }
      .track.on .knob { transform:translateX(20px); }
      .label { font-size:14px; }
      .status { font-size:12px; color:var(--muted); transition:color 220ms; }
      .status.on { color:var(--accent); font-weight:500; }

      .second { display:flex; align-items:center; gap:12px; }
      .icon-btn { appearance:none; border:0; background:transparent; cursor:pointer; width:40px; height:40px; border-radius:10px; display:grid; place-items:center; color:var(--muted); transition:background 160ms, color 160ms, transform 120ms; }
      .icon-btn:hover { background:#f2eee5; color:var(--fg); }
      .icon-btn:active { transform:scale(0.9); }
      .icon-btn.active { color:var(--accent); }
      .icon-btn svg { width:20px; height:20px; display:block; }
      .hint { font-size:12px; color:var(--muted); text-align:center; margin:0; }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="switch-row" id="switchRow">
        <div class="track" id="track"><div class="knob"></div></div>
        <span class="label">通知</span>
        <span class="status" id="status">已关闭</span>
      </div>
      <div class="second">
        <button class="icon-btn" id="likeBtn" type="button" aria-label="点赞">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-8-5.5-8-10c0-3 2.5-5.5 5.5-5.5S12 6.5 12 6.5s2.5-3 5.5-3S21 8 21 11c0 4.5-9 10-9 10z"/></svg>
        </button>
        <button class="icon-btn" id="favBtn" type="button" aria-label="收藏">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><path d="M12 4.8 14.2 9l4.7.7-3.4 3.3.8 4.7L12 15.5l-4.2 2.2.8-4.7-3.4-3.3 4.7-.7L12 4.8Z"/></svg>
        </button>
      </div>
      <p class="hint">切换开关、点赞收藏——小操作的小反馈</p>
    </div>
    <script>
      (function () {
        var track = document.getElementById('track');
        var status = document.getElementById('status');
        var switchRow = document.getElementById('switchRow');

        switchRow.addEventListener('click', function () {
          var on = track.classList.toggle('on');
          status.classList.toggle('on', on);
          status.textContent = on ? '已开启' : '已关闭';
        });

        function toggleBtn(btn) {
          btn.classList.toggle('active');
          btn.style.transition = 'none';
          btn.style.transform = 'scale(1.2)';
          requestAnimationFrame(function () {
            btn.style.transition = '';
            btn.style.transform = '';
          });
        }

        document.getElementById('likeBtn').addEventListener('click', function () { toggleBtn(this); });
        document.getElementById('favBtn').addEventListener('click', function () { toggleBtn(this); });
      })();
    </script>
  </body>
</html>
