<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Micro Interaction</title>
    <style>
      :root { --bg:#faf8f3; --fg:#1a1815; --muted:#6b6760; --border:#d8d3c5; --card:#fff; --ok:#2f8f5a; }
      * { box-sizing:border-box; }
      html, body { height:100%; margin:0; }
      body { background:var(--bg); color:var(--fg); font:14px/1.55 -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB',sans-serif; display:grid; place-items:center; padding:32px; }
      .stage { display:grid; gap:13px; place-items:center; }
      .save { appearance:none; cursor:pointer; border:1px solid var(--border); background:var(--card); color:var(--fg); border-radius:999px; padding:9px 15px; display:inline-flex; align-items:center; gap:8px; font:inherit; font-weight:500; transition:border-color 150ms ease, color 150ms ease, transform 120ms ease; }
      .save:hover { border-color:#bdb6a7; }
      .save:active { transform:scale(0.97); }
      .save[data-saved='true'] { color:var(--ok); border-color:#b8d8c3; }
      .icon { width:16px; height:16px; transition:transform 180ms cubic-bezier(0.2,0,0,1), fill 150ms ease; fill:transparent; }
      .save[data-saved='true'] .icon { transform:scale(1.12); fill:currentColor; }
      .hint { margin:0; color:var(--muted); font-size:12px; }
    </style>
  </head>
  <body>
    <div class="stage">
      <button class="save" id="save" type="button" data-saved="false">
        <svg class="icon" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><path d="M12 4.8 14.2 9l4.7.7-3.4 3.3.8 4.7L12 15.5l-4.2 2.2.8-4.7-3.4-3.3 4.7-.7L12 4.8Z"/></svg>
        <span id="label">收藏</span>
      </button>
      <p class="hint">微交互让小操作有明确回声。</p>
    </div>
    <script>
      (function () {
        var btn = document.getElementById('save');
        var label = document.getElementById('label');
        btn.addEventListener('click', function () {
          var next = btn.getAttribute('data-saved') !== 'true';
          btn.setAttribute('data-saved', next ? 'true' : 'false');
          label.textContent = next ? '已收藏' : '收藏';
        });
      })();
    </script>
  </body>
</html>
