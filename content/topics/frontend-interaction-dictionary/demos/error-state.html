<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Error State</title>
    <style>
      :root {
        --bg: #faf8f3;
        --fg: #1a1815;
        --muted: #6b6760;
        --border: #d8d3c5;
        --card: #ffffff;
        --accent: #b9483d;
        --danger: #b9473d;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        background: var(--bg);
        color: var(--fg);
        font: 14px/1.55 -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
        display: grid;
        place-items: center;
        padding: 32px;
      }
      .stage { width: 100%; max-width: 360px; }
      .panel {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 22px;
        display: grid;
        gap: 14px;
        box-shadow: 0 1px 0 rgba(20, 18, 14, 0.03);
      }
      .icon {
        width: 38px; height: 38px; border-radius: 10px;
        display: grid; place-items: center;
        background: #f5e4df;
        color: var(--danger);
      }
      h3 { margin: 0; font-size: 15px; font-weight: 600; }
      p { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.6; }
      button {
        justify-self: start;
        appearance: none;
        border: 1px solid var(--fg);
        background: var(--fg);
        color: var(--bg);
        border-radius: 8px;
        padding: 8px 14px;
        font: inherit;
        font-weight: 500;
        cursor: pointer;
        transition: transform 120ms ease, background-color 160ms ease, opacity 160ms ease;
      }
      button:hover { background: #2a2722; }
      button:active { transform: scale(0.98); }
      button[disabled] { opacity: 0.75; cursor: wait; }
      .status { font: 500 11px/1 ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: 0.14em; color: var(--muted); text-transform: uppercase; }
    </style>
  </head>
  <body>
    <section class="stage">
      <div class="panel" id="panel">
        <div class="status">Request failed</div>
        <div class="icon" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <path d="M12 8v5" /><path d="M12 17h.01" /><path d="M10.3 4.4 2.7 17.5A2 2 0 0 0 4.4 20h15.2a2 2 0 0 0 1.7-2.5L13.7 4.4a2 2 0 0 0-3.4 0Z" />
          </svg>
        </div>
        <h3>数据加载失败</h3>
        <p>网络连接不稳定。保留当前页面结构，并给用户一个明确的重试入口。</p>
        <button id="retry" type="button">重新加载</button>
      </div>
    </section>
    <script>
      (function () {
        var retry = document.getElementById('retry');
        retry.addEventListener('click', function () {
          retry.disabled = true;
          retry.textContent = '加载中...';
          setTimeout(function () {
            retry.disabled = false;
            retry.textContent = '重新加载';
          }, 1300);
        });
      })();
    </script>
  </body>
</html>
