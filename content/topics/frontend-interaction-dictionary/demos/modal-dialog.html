<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Modal Dialog</title>
    <style>
      :root { --bg:#faf8f3; --fg:#1a1815; --muted:#6b6760; --border:#d8d3c5; --card:#fff; --danger:#b9473d; }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body { background: var(--bg); color: var(--fg); font: 14px/1.55 -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif; display: grid; place-items: center; padding: 32px; }
      .btn { appearance:none; cursor:pointer; font:inherit; font-weight:500; border-radius:8px; padding:9px 15px; border:1px solid var(--border); background:var(--card); color:var(--fg); transition:background-color 160ms ease, transform 120ms ease; }
      .btn:hover { background:#f2eee5; }
      .btn:active { transform:scale(0.98); }
      .btn.danger { border-color:var(--danger); background:var(--danger); color:#fffaf5; }
      .btn.danger:hover { background:#a63d35; }
      .overlay { position:fixed; inset:0; display:grid; place-items:center; padding:24px; background:rgba(26,24,21,0.28); opacity:0; pointer-events:none; transition:opacity 180ms ease; }
      .overlay[data-open='true'] { opacity:1; pointer-events:auto; }
      .dialog { width:min(360px,100%); background:var(--card); border:1px solid var(--border); border-radius:12px; padding:20px; box-shadow:0 24px 50px -28px rgba(20,18,14,0.5); transform:translateY(8px) scale(0.98); transition:transform 180ms cubic-bezier(0.2,0,0,1); }
      .overlay[data-open='true'] .dialog { transform:translateY(0) scale(1); }
      h3 { margin:0 0 8px; font-size:16px; }
      p { margin:0 0 18px; color:var(--muted); font-size:13px; line-height:1.6; }
      .actions { display:flex; justify-content:flex-end; gap:8px; }
    </style>
  </head>
  <body>
    <button class="btn danger" id="open" type="button">删除项目</button>
    <div class="overlay" id="overlay" aria-hidden="true">
      <section class="dialog" role="dialog" aria-modal="true" aria-labelledby="title">
        <h3 id="title">确认删除项目？</h3>
        <p>这个操作不可撤销。删除前用 modal 打断流程，让用户明确确认。</p>
        <div class="actions">
          <button class="btn" id="cancel" type="button">取消</button>
          <button class="btn danger" id="confirm" type="button">确认删除</button>
        </div>
      </section>
    </div>
    <script>
      (function () {
        var overlay = document.getElementById('overlay');
        var open = document.getElementById('open');
        var cancel = document.getElementById('cancel');
        var confirm = document.getElementById('confirm');
        function setOpen(value) { overlay.setAttribute('data-open', value ? 'true' : 'false'); overlay.setAttribute('aria-hidden', value ? 'false' : 'true'); }
        open.addEventListener('click', function () { setOpen(true); });
        cancel.addEventListener('click', function () { setOpen(false); });
        confirm.addEventListener('click', function () { setOpen(false); });
        overlay.addEventListener('click', function (event) { if (event.target === overlay) setOpen(false); });
        document.addEventListener('keydown', function (event) { if (event.key === 'Escape') setOpen(false); });
      })();
    </script>
  </body>
</html>
