<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Responsive Interaction</title>
    <style>
      :root { --bg:#faf8f3; --fg:#1a1815; --muted:#6b6760; --border:#d8d3c5; --card:#fff; }
      * { box-sizing:border-box; }
      html, body { height:100%; margin:0; }
      body { background:var(--bg); color:var(--fg); font:14px/1.55 -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB',sans-serif; display:grid; place-items:center; padding:28px; overflow:hidden; }
      .shell { width:min(390px,100%); background:var(--card); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
      .nav { height:52px; display:flex; align-items:center; justify-content:space-between; padding:0 14px; border-bottom:1px solid var(--border); }
      .brand { font-weight:600; }
      .desktop { display:flex; gap:6px; }
      .desktop button, .menu-btn { border:0; background:transparent; border-radius:8px; padding:7px 9px; cursor:pointer; font:inherit; color:var(--muted); }
      .desktop button:hover { background:#f2eee5; color:var(--fg); }
      .menu-btn { display:none; border:1px solid var(--border); color:var(--fg); }
      .body { padding:18px; color:var(--muted); font-size:13px; line-height:1.65; min-height:120px; }
      .drawer { position:fixed; inset:0 auto 0 0; width:min(260px,80vw); background:var(--card); border-right:1px solid var(--border); padding:18px; transform:translateX(-100%); transition:transform 200ms cubic-bezier(0.2,0,0,1); box-shadow:20px 0 40px -32px rgba(20,18,14,0.45); }
      .drawer[data-open='true'] { transform:translateX(0); }
      .drawer button { width:100%; border:0; background:transparent; text-align:left; border-radius:8px; padding:10px; font:inherit; color:var(--fg); }
      .drawer button:hover { background:#f2eee5; }
      @media (max-width: 420px) {
        .desktop { display:none; }
        .menu-btn { display:block; }
      }
    </style>
  </head>
  <body>
    <section class="shell">
      <nav class="nav"><span class="brand">Console</span><div class="desktop"><button>概览</button><button>成员</button><button>设置</button></div><button class="menu-btn" id="open" type="button">菜单</button></nav>
      <div class="body">桌面端可以 hover 导航；移动端没有 hover，需要改成点击按钮打开 drawer。</div>
    </section>
    <aside class="drawer" id="drawer"><button>概览</button><button>成员</button><button>设置</button></aside>
    <script>
      (function () {
        var open = document.getElementById('open');
        var drawer = document.getElementById('drawer');
        open.addEventListener('click', function () { drawer.setAttribute('data-open', drawer.getAttribute('data-open') !== 'true' ? 'true' : 'false'); });
      })();
    </script>
  </body>
</html>
