<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pressed State</title>
    <style>
      :root {
        --bg: #faf8f3;
        --fg: #1a1815;
        --muted: #6b6760;
        --border: #d8d3c5;
        --accent: #b9483d;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        background: var(--bg);
        color: var(--fg);
        font: 14px/1.55 -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
        display: grid;
        place-items: center;
        padding: 32px;
      }
      .stage { display: grid; gap: 18px; place-items: center; }
      .stage-label {
        font: 500 10.5px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
        letter-spacing: 0.22em;
        color: var(--muted);
        text-transform: uppercase;
      }
      .row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
      .btn {
        appearance: none;
        cursor: pointer;
        font: inherit;
        font-weight: 500;
        padding: 10px 18px;
        border-radius: 8px;
        border: 1px solid var(--fg);
        background: var(--fg);
        color: #faf8f3;
        transition: transform 100ms cubic-bezier(0.2, 0, 0, 1), background-color 120ms ease;
        user-select: none;
      }
      .btn:hover { background: #2a2722; }
      .btn:active { transform: scale(0.97); background: #000; }
      .btn.ghost {
        background: transparent;
        color: var(--fg);
      }
      .btn.ghost:hover { background: rgba(20, 18, 14, 0.05); }
      .btn.ghost:active { transform: scale(0.97); background: rgba(20, 18, 14, 0.1); }
      .hint {
        font-size: 12px;
        color: var(--muted);
        text-align: center;
        max-width: 240px;
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="stage-label">Press &amp; hold</div>
      <div class="row">
        <button class="btn">Primary</button>
        <button class="btn ghost">Ghost</button>
      </div>
      <p class="hint">按住时按钮缩到 0.97，模拟物理按下感。</p>
    </div>
  </body>
</html>
