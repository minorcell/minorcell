<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Progress Bar</title>
    <style>
      :root { --bg:#faf8f3; --fg:#1a1815; --muted:#6b6760; --border:#d8d3c5; --card:#fff; --accent:#b9483d; --success:#2e9d5e; }
      * { box-sizing:border-box; }
      html, body { height:100%; margin:0; }
      body { background:var(--bg); color:var(--fg); font:14px/1.55 -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB',sans-serif; display:grid; place-items:center; padding:24px; }
      .shell { width:100%; max-width:360px; background:var(--card); border:1px solid var(--border); border-radius:12px; padding:24px; }
      .section { margin-bottom:20px; }
      .section:last-child { margin-bottom:0; }
      .header { display:flex; justify-content:space-between; margin-bottom:6px; font-size:12px; }
      .bar { height:6px; background:#f2eee5; border-radius:3px; overflow:hidden; }
      .fill { height:100%; background:var(--accent); border-radius:3px; transition:width 300ms cubic-bezier(0.2,0,0,1); width:0%; }
      .fill.success { background:var(--success); }
      .fill.indeterminate { width:30%; animation:shimmer 1.4s ease-in-out infinite; }
      @keyframes shimmer { 0%{transform:translateX(-100%)} 100%{transform:translateX(400%)} }
      .row { display:flex; gap:8px; }
      .btn { flex:1; border:1px solid var(--border); background:var(--card); border-radius:8px; padding:8px 0; cursor:pointer; font:inherit; font-size:13px; color:var(--fg); text-align:center; }
      .btn:hover { background:#f2eee5; }
      .btn:disabled { opacity:0.35; cursor:default; }
      .btn.primary { background:var(--accent); border-color:var(--accent); color:#fff; }
      .btn.primary:hover { opacity:0.9; }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="section">
        <div class="header"><span>上传文件</span><span id="pct">0%</span></div>
        <div class="bar"><div class="fill" id="fill"></div></div>
      </div>
      <div class="section">
        <div class="header"><span>页面加载</span><span>indeterminate</span></div>
        <div class="bar"><div class="fill indeterminate" id="indet"></div></div>
      </div>
      <div class="row">
        <button class="btn primary" id="startBtn">开始上传</button>
        <button class="btn" id="resetBtn" disabled>重置</button>
      </div>
    </div>
    <script>
      (function () {
        var fill = document.getElementById('fill');
        var pct = document.getElementById('pct');
        var startBtn = document.getElementById('startBtn');
        var resetBtn = document.getElementById('resetBtn');
        var timer = null;
        var val = 0;
        var running = false;

        function start() {
          if (running) return;
          if (val >= 100) { val = 0; }
          running = true;
          startBtn.disabled = true;
          resetBtn.disabled = true;
          fill.classList.remove('success');

          timer = setInterval(function () {
            val += Math.random() * 8 + 2;
            if (val >= 100) {
              val = 100;
              clearInterval(timer);
              timer = null;
              running = false;
              fill.classList.add('success');
              startBtn.disabled = false;
              resetBtn.disabled = false;
            }
            fill.style.width = val + '%';
            pct.textContent = Math.round(val) + '%';
          }, 200);
        }

        function reset() {
          if (running) return;
          val = 0;
          fill.style.width = '0%';
          fill.classList.remove('success');
          pct.textContent = '0%';
        }

        startBtn.addEventListener('click', start);
        resetBtn.addEventListener('click', reset);
      })();
    </script>
  </body>
</html>
