<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #fff;
    color: #111827;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }
  .container { display: flex; flex-direction: column; gap: 12px; max-width: 460px; width: 100%; height: 88vh; }
  .stats-row { display: flex; gap: 12px; }
  .stat-card {
    flex: 1; text-align: center; padding: 16px 12px;
    border-radius: 12px; border: 1px solid #e5e7eb; background: #f8f9fa;
  }
  .stat-value { font-size: 30px; font-weight: 700; line-height: 1; font-variant-numeric: tabular-nums; }
  .stat-value.warn { color: #dc2626; }
  .stat-value.good { color: #2563eb; }
  .stat-label { font-size: 10px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 4px; }
  .scroll-box {
    flex: 1; overflow-y: auto; border-radius: 12px; border: 1px solid #e5e7eb;
    background: #f8f9fa; padding: 4px;
  }
  .item {
    padding: 14px 16px; margin: 4px; border-radius: 8px;
    background: #fff; border: 1px solid #f3f4f6; font-size: 13px;
    color: #374151;
  }
  .item:nth-child(odd) { background: #fcfcfd; }
  .hint {
    font-size: 11px; color: #9ca3af; text-align: center;
    padding: 0 4px; line-height: 1.5;
  }
</style>
</head>
<body>
<div class="container">
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-value warn" id="normal-count">0</div>
      <div class="stat-label">无节流 · 每次触发</div>
    </div>
    <div class="stat-card">
      <div class="stat-value good" id="throttle-count">0</div>
      <div class="stat-label">节流 · 每 500ms</div>
    </div>
  </div>
  <div class="scroll-box" id="scroll-box">
    <div class="hint" style="padding:10px 0">↓ 快速滚动查看效果 ↓</div>
  </div>
</div>
<script>
  const box = document.getElementById('scroll-box');
  for (let i = 1; i <= 40; i++) {
    const div = document.createElement('div');
    div.className = 'item';
    div.textContent = '滚动行 ' + i;
    box.appendChild(div);
  }
  let nCount = 0, tCount = 0, lastTime = 0;
  box.addEventListener('scroll', () => {
    nCount++;
    document.getElementById('normal-count').textContent = nCount;
    const now = Date.now();
    if (now - lastTime >= 500) {
      tCount++;
      document.getElementById('throttle-count').textContent = tCount;
      lastTime = now;
    }
  });
</script>
</body>
</html>
