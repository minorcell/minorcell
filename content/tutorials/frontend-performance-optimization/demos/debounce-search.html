<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #fff;
    color: #111827;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }
  .container { display: flex; flex-direction: column; gap: 16px; max-width: 460px; width: 100%; }
  .panel {
    padding: 20px; border-radius: 12px; border: 1px solid #e5e7eb;
    background: #f8f9fa; display: flex; flex-direction: column; gap: 12px;
  }
  .panel-header { display: flex; justify-content: space-between; align-items: center; }
  .panel-label { font-size: 13px; font-weight: 600; color: #111827; }
  .panel-badge {
    font-size: 10px; padding: 3px 8px; border-radius: 20px;
    font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
  }
  .panel-badge.bad { background: #fee2e2; color: #dc2626; }
  .panel-badge.good { background: #dcfce7; color: #16a34a; }
  .input {
    width: 100%; padding: 11px 14px; border-radius: 8px;
    background: #fff; border: 1px solid #e5e7eb; color: #111827;
    font-size: 14px; font-family: inherit; outline: none;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }
  .input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
  .stats-row { display: flex; align-items: baseline; gap: 8px; }
  .req-count { font-size: 32px; font-weight: 700; color: #2563eb; line-height: 1; font-variant-numeric: tabular-nums; }
  .req-label { font-size: 12px; color: #6b7280; }
  .req-count.high { color: #dc2626; }
  .last-result { font-size: 12px; color: #9ca3af; min-height: 16px; }
</style>
</head>
<body>
<div class="container">
  <div class="panel">
    <div class="panel-header">
      <span class="panel-label">普通输入 — 每次按键都触发请求</span>
      <span class="panel-badge bad">浪费</span>
    </div>
    <input class="input" placeholder="快速输入试试…" id="normal-input">
    <div class="stats-row">
      <span class="req-count high" id="normal-count">0</span>
      <span class="req-label">次 API 请求</span>
    </div>
    <div class="last-result" id="normal-result"></div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span class="panel-label">防抖输入 — 停止 500ms 后才触发</span>
      <span class="panel-badge good">高效</span>
    </div>
    <input class="input" placeholder="快速输入试试…" id="debounce-input">
    <div class="stats-row">
      <span class="req-count" id="debounce-count">0</span>
      <span class="req-label">次 API 请求</span>
    </div>
    <div class="last-result" id="debounce-result"></div>
  </div>
</div>
<script>
  let nCount = 0, dCount = 0;
  document.getElementById('normal-input').addEventListener('input', (e) => {
    nCount++;
    document.getElementById('normal-count').textContent = nCount;
    document.getElementById('normal-result').textContent = '搜索: ' + e.target.value;
  });

  let timer;
  document.getElementById('debounce-input').addEventListener('input', (e) => {
    clearTimeout(timer);
    timer = setTimeout(() => {
      dCount++;
      document.getElementById('debounce-count').textContent = dCount;
      document.getElementById('debounce-result').textContent = '搜索: ' + e.target.value;
    }, 500);
  });
</script>
</body>
</html>
